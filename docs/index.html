<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->

  <script>
    window.dataLayer = window.dataLayer || [];

  <meta charset="UTF-8">
  <meta name="google-site-verification" content="zTMWm025Bq4qDdePXEw9n3dyI1DwGEYngA0R8zHPPok" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Live leaderboard for the Red Bull FASTER 2026 tournament.">
  <meta property="og:title" content="Red Bull FASTER 2026 — Leaderboard">
  <meta property="og:description" content="Live combined leaderboard for all three Red Bull FASTER Trackmania 2020 maps — OBSTACLE, EVEREST and SKATE.">
  <meta property="og:image" content="https://br3zzly.github.io/RedbullFasterLeaderboard/favicon.ico">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Red Bull FASTER Leaderboard">
  <meta name="twitter:card" content="summary">
  <title>Red Bull FASTER — Leaderboard</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-glow"></div>

  <header class="header">
    <div class="header-content">
      <div class="event-badge">TRACKMANIA</div>
      <h1 class="title">RED BULL <span class="title-accent">FASTER</span><sup class="title-year">2026</sup></h1>
      <p class="subtitle">LEADERBOARD</p>
    </div>
  </header>

  <main class="main">
    <div class="status-bar">
      <div class="status-left">
        <span class="player-count" id="playerCount">—</span>
        <span class="status-label">players</span>
      </div>
      <div class="status-center">
        <input type="text" id="searchInput" class="search-input" placeholder="Search player...">
      </div>
      <div class="status-right">
        <span class="refresh-dot" id="refreshDot"></span>
        <span class="status-label">Updated <span id="lastUpdated">—</span></span>
      </div>
    </div>

    <div class="table-wrapper">
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Loading leaderboard data...</p>
      </div>
      <div id="error" class="error" style="display:none"></div>
      <table id="leaderboard" class="leaderboard" style="display:none">
        <thead>
          <tr>
            <th class="col-rank" id="rankHeader">#</th>
            <th class="col-player">Player</th>
            <th class="col-time sortable" id="mapHeader1"><span>Map 1</span> <span class="sort-arrow"></span></th>
            <th class="col-time sortable" id="mapHeader2"><span>Map 2</span> <span class="sort-arrow"></span></th>
            <th class="col-time sortable" id="mapHeader3"><span>Map 3</span> <span class="sort-arrow"></span></th>
            <th class="col-total sortable sort-active" id="totalHeader"><span>Total</span> <span class="sort-arrow"></span></th>
            <th class="col-improved">Last Improved</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody"></tbody>
      </table>
      <div id="loadMoreWrap" class="load-more-wrap" style="display:none">
        <button id="loadMoreBtn" class="load-more-btn">Load More</button>
        <span id="loadMoreInfo" class="load-more-info"></span>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>Data sourced from Nadeo Live Services. Not affiliated with Red Bull or Ubisoft Nadeo.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
