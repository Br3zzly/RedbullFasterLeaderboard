[vars]
# Map UIDs (public, safe to commit)
MAP1_UID = "ne1uhbsWhrUBuveYEx9p08C23Dm"
MAP2_UID = "eLEM0x9TFwpHqnjMPHoesoXTiwk"
MAP3_UID = "SULHiiCvz0g0oIGp1uAyqkLFPoh"
MAP1_NAME = "OBSTACLE"
MAP2_NAME = "EVEREST"
