# Secrets (set via `wrangler secret put`):
# NADEO_LOGIN        — Service account login
# NADEO_PASSWORD     — Service account password
# OAUTH_CLIENT_ID    — OAuth app identifier from api.trackmania.com
# OAUTH_CLIENT_SECRET — OAuth app secret from api.trackmania.com

# KV namespace for caching display names
# Create with: npx wrangler kv namespace create DISPLAY_NAMES
# Then paste the id below
[[kv_namespaces]]
